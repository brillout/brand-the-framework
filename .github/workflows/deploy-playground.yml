# Build the playground with Vite and publish it to GitHub Pages.
name: Deploy playground to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, but let in-progress runs finish.
concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Build playground
        # base_path is e.g. /brand-the-framework — Vite wants a trailing slash.
        run: pnpm exec vite build playground --base "${{ steps.pages.outputs.base_path }}/"
      - uses: actions/upload-pages-artifact@v3
        with:
          path: playground/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true
      # The Pages backend intermittently rejects deployments with "Deployment
      # failed, try again later." — so do exactly that, once, after a pause.
      - name: Wait before retrying
        if: steps.deployment.outcome == 'failure'
        run: sleep 30
      - name: Deploy to GitHub Pages (retry)
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
